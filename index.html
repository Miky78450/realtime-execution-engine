<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Execution Engine — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #080c10;
    color: #c9d1d9;
    font-family: 'JetBrains Mono', monospace;
  }

  body {
    display: grid;
    grid-template-rows: 44px 1fr;
  }

  /* ── TAB BAR ── */
  .tabbar {
    display: flex;
    align-items: center;
    background: #0d1117;
    border-bottom: 1px solid #1e2d3d;
    padding: 0 16px;
    gap: 4px;
    position: relative;
    z-index: 10;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: #00d4ff;
    text-shadow: 0 0 14px rgba(0, 212, 255, 0.35);
    margin-right: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
  }

  .brand-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(0.85); }
  }

  .tab {
    padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: #7b8fa6;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 100%;
  }

  .tab:hover {
    color: #c9d1d9;
    background: rgba(255, 255, 255, 0.02);
  }

  .tab.active {
    color: #00d4ff;
    border-bottom-color: #00d4ff;
    background: rgba(0, 212, 255, 0.04);
  }

  .tab-icon {
    font-size: 14px;
  }

  .tabbar-spacer { flex: 1; }

  .meta-link {
    font-size: 11px;
    color: #4a5568;
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid #1e2d3d;
    transition: all 0.15s;
  }

  .meta-link:hover {
    color: #00d4ff;
    border-color: #00d4ff;
  }

  /* ── FRAMES ── */
  .frames {
    position: relative;
    overflow: hidden;
  }

  .frames iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #080c10;
    display: none;
  }

  .frames iframe.active {
    display: block;
  }
</style>
</head>
<body>

<nav class="tabbar">
  <div class="brand">
    <span class="brand-dot"></span>
    NQ Engine
  </div>
  <button class="tab active" data-target="frame-demo">
    <span class="tab-icon">🤖</span>
    Démo Live
  </button>
  <button class="tab" data-target="frame-stats">
    <span class="tab-icon">📊</span>
    Statistiques
  </button>
  <div class="tabbar-spacer"></div>
  <a class="meta-link" href="https://github.com/Miky78450/realtime-execution-engine" target="_blank" rel="noopener">GitHub ↗</a>
</nav>

<div class="frames">
  <iframe id="frame-demo"  src="/demo"  class="active" title="Démo live"></iframe>
  <iframe id="frame-stats" src="/stats"               title="Statistiques"></iframe>
</div>

<script>
  const tabs    = document.querySelectorAll('.tab');
  const frames  = document.querySelectorAll('.frames iframe');
  const loaded  = { 'frame-demo': true, 'frame-stats': false };

  // Lazy-load la 2ème iframe au premier clic pour éviter de tout charger d'un coup
  document.getElementById('frame-stats').addEventListener('load', () => {
    loaded['frame-stats'] = true;
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const targetId = tab.dataset.target;

      tabs.forEach(t => t.classList.toggle('active', t === tab));
      frames.forEach(f => f.classList.toggle('active', f.id === targetId));
    });
  });
</script>

</body>
</html>
