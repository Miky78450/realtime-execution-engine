<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ICT Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0f14;
  --bg2:      #131720;
  --bg3:      #1a1f2e;
  --bg4:      #1e2435;
  --border:   #252d3f;
  --border2:  #2e3850;
  --text:     #e2e8f0;
  --text2:    #94a3b8;
  --text3:    #4a5568;
  --blue:     #6366f1;
  --blue2:    #818cf8;
  --pink:     #ec4899;
  --pink2:    #f472b6;
  --cyan:     #06b6d4;
  --cyan2:    #22d3ee;
  --green:    #10b981;
  --green2:   #34d399;
  --red:      #ef4444;
  --red2:     #f87171;
  --gold:     #f59e0b;
  --gold2:    #fbbf24;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  display: flex;
  height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 64px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  gap: 8px;
  flex-shrink: 0;
}

.sidebar-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--blue), var(--pink));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; margin-bottom: 16px;
}

.sidebar-btn {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text3);
  transition: all .2s; font-size: 16px;
}

.sidebar-btn:hover, .sidebar-btn.active {
  background: var(--bg3);
  color: var(--blue2);
}

.sidebar-btn.active {
  background: rgba(99,102,241,.15);
  color: var(--blue2);
}

.sidebar-spacer { flex: 1; }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: 56px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.topbar-sub {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  margin-left: 4px;
}

.topbar-spacer { flex: 1; }

.status-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
  background: rgba(16,185,129,.1);
  border: 1px solid rgba(16,185,129,.2);
  color: var(--green2);
}

.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green2);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── KPI ROW ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color .2s, transform .2s;
  cursor: default;
}

.kpi-card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.kpi-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kpi-icon.blue  { background: rgba(99,102,241,.15); }
.kpi-icon.pink  { background: rgba(236,72,153,.15); }
.kpi-icon.cyan  { background: rgba(6,182,212,.15); }
.kpi-icon.green { background: rgba(16,185,129,.15); }
.kpi-icon.gold  { background: rgba(245,158,11,.15); }
.kpi-icon.red   { background: rgba(239,68,68,.15); }

.kpi-info { flex: 1; min-width: 0; }
.kpi-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: .04em; margin-bottom: 4px; }
.kpi-value { font-size: 20px; font-weight: 700; line-height: 1; }
.kpi-value.blue  { color: var(--blue2); }
.kpi-value.pink  { color: var(--pink2); }
.kpi-value.cyan  { color: var(--cyan2); }
.kpi-value.green { color: var(--green2); }
.kpi-value.gold  { color: var(--gold2); }
.kpi-value.red   { color: var(--red2); }
.kpi-value.pos   { color: var(--green2); }
.kpi-value.neg   { color: var(--red2); }
.kpi-sub { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: var(--mono); }

/* ── DONUT ── */
.donut-wrap {
  position: relative;
  width: 48px; height: 48px;
  flex-shrink: 0;
}

.donut-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }

.donut-center {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  font-family: var(--mono);
}

/* ── GRID 2/3 ── */
.row-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ── CARD ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.card-head {
  padding: 16px 20px 12px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}

.card-title { font-size: 12px; font-weight: 600; color: var(--text); }
.card-sub { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-left: auto; }

/* ── CHART ── */
.chart-box { padding: 16px 20px; height: 180px; }
canvas { width: 100%; height: 100%; }

/* ── SETUP CARDS ── */
.setup-grid { display: grid; grid-template-columns: 1fr 1fr; }

.setup-side {
  padding: 18px 20px;
  border-right: 1px solid var(--border);
}
.setup-side:last-child { border-right: none; }

.setup-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; letter-spacing: .06em;
  padding: 3px 8px; border-radius: 5px; margin-bottom: 10px;
}
.setup-tag.bear { color: var(--red2); background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.2); }
.setup-tag.bull { color: var(--green2); background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.2); }

.setup-eq {
  font-size: 22px; font-weight: 700; margin-bottom: 14px;
  font-family: var(--mono);
}
.setup-eq.pos { color: var(--green2); }
.setup-eq.neg { color: var(--red2); }

.metric-mini-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 12px; }

.metric-mini {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px;
}
.mm-label { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
.mm-val { font-size: 15px; font-weight: 700; font-family: var(--mono); }
.mm-val.blue  { color: var(--blue2); }
.mm-val.pos   { color: var(--green2); }
.mm-val.neg   { color: var(--red2); }
.mm-val.gold  { color: var(--gold2); }
.mm-val.cyan  { color: var(--cyan2); }

.sess-row { display: flex; gap: 6px; }
.sess-chip {
  font-size: 10px; font-family: var(--mono);
  padding: 3px 9px; border-radius: 5px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2);
}

/* ── MONTH TABLE ── */
.m-table { width: 100%; border-collapse: collapse; }
.m-table th {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3); font-weight: 500;
  padding: 8px 16px; text-align: right;
  border-bottom: 1px solid var(--border);
}
.m-table th:first-child { text-align: left; }
.m-table td {
  padding: 7px 16px; text-align: right;
  border-bottom: 1px solid rgba(37,45,63,.6);
  font-family: var(--mono); font-size: 11px; color: var(--text2);
  transition: background .1s;
}
.m-table td:first-child { text-align: left; color: var(--text3); }
.m-table tr:hover td { background: var(--bg3); }
.m-table tr:last-child td { border-bottom: none; }
.pos-v { color: var(--green2) !important; }
.neg-v { color: var(--red2) !important; }

.wr-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600;
}
.wr-pill.pos { background: rgba(16,185,129,.1); color: var(--green2); }
.wr-pill.neg { background: rgba(239,68,68,.1); color: var(--red2); }

/* ── TRADES TABLE ── */
.t-table { width: 100%; border-collapse: collapse; }
.t-table th {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3); font-weight: 500;
  padding: 8px 14px; text-align: right;
  border-bottom: 1px solid var(--border);
}
.t-table th:first-child { text-align: left; }
.t-table td {
  padding: 6px 14px; text-align: right;
  border-bottom: 1px solid rgba(37,45,63,.5);
  font-family: var(--mono); font-size: 11px; color: var(--text2);
  transition: background .1s;
}
.t-table td:first-child { text-align: left; }
.t-table tr:hover td { background: var(--bg3); }
.t-table tr:last-child td { border-bottom: none; }

.t-badge {
  display: inline-flex; align-items: center;
  font-size: 9px; font-weight: 600; letter-spacing: .05em;
  padding: 2px 7px; border-radius: 4px;
}
.t-s1 { color: var(--red2); background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.15); }
.t-s2 { color: var(--green2); background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.15); }

/* ── BAR CHART ── */
.bar-chart {
  display: flex; align-items: flex-end; gap: 3px;
  padding: 12px 16px 0; height: 80px;
}
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: opacity .2s; }
.bar:hover { opacity: .8; }
.bar-lbl { font-size: 8px; font-family: var(--mono); color: var(--text3); }

/* ── LOADING ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 60vh; color: var(--text3); font-size: 12px;
  font-family: var(--mono); letter-spacing: .1em;
}

/* ── ANIMS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
.anim { animation: fadeUp .3s ease forwards; opacity: 0; }
.d0{animation-delay:.0s;} .d1{animation-delay:.06s;} .d2{animation-delay:.12s;}
.d3{animation-delay:.18s;} .d4{animation-delay:.24s;} .d5{animation-delay:.3s;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">📈</div>
  <div class="sidebar-btn active" title="Stats">📊</div>
  <div class="sidebar-btn" title="Trades">🔄</div>
  <div class="sidebar-btn" title="Mois">📅</div>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-btn" title="Paramètres">⚙️</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">Dashboard</div>
    <div class="topbar-sub" id="period">—</div>
    <div class="topbar-spacer"></div>
    <div class="status-badge">
      <div class="status-dot"></div>
      ICT Strategy Live
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="loading">Chargement des données…</div>
  </div>

</div>

<script>
async function load() {
  const r = await fetch('/api/stats');
  const d = await r.json();
  render(d);
}

const fmtD = (v, p=false) => {
  const n = Math.round(parseFloat(v)||0);
  return (p&&n>0?'+':'') + n.toLocaleString('fr-FR') + ' $';
};
const fmtR = (v, p=true) => {
  const n = parseFloat(v)||0;
  return (p&&n>0?'+':'') + n.toFixed(1) + 'R';
};
const cc = v => parseFloat(v)>0 ? 'pos' : parseFloat(v)<0 ? 'neg' : '';

// Donut SVG
function donut(pct, color, text) {
  const r=20, c=24, circ=2*Math.PI*r;
  const dash = (pct/100)*circ;
  return `<div class="donut-wrap">
    <svg viewBox="0 0 48 48">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="donut-center" style="color:${color}">${text}</div>
  </div>`;
}

function render(d) {
  document.getElementById('period').textContent = d.period + ' · ' + d.csv;

  const content = document.getElementById('content');

  const s1 = d.setups.find(s=>s.name.includes('Bear'))||{};
  const s2 = d.setups.find(s=>s.name.includes('Bull'))||{};

  content.innerHTML = `

  <!-- ROW 1 : KPIs -->
  <div class="kpi-row">
    <div class="kpi-card anim d0">
      <div class="kpi-icon blue">🎯</div>
      <div class="kpi-info">
        <div class="kpi-label">Total Trades</div>
        <div class="kpi-value blue">${d.total}</div>
        <div class="kpi-sub">${d.wins}W · ${d.losses}L</div>
      </div>
      ${donut(d.wr, 'var(--blue2)', d.wr+'%')}
    </div>
    <div class="kpi-card anim d1">
      <div class="kpi-icon ${d.eq_r>0?'green':'red'}">${d.eq_r>0?'📈':'📉'}</div>
      <div class="kpi-info">
        <div class="kpi-label">Equity</div>
        <div class="kpi-value ${d.eq_r>0?'pos':'neg'}">${fmtR(d.eq_r)}</div>
        <div class="kpi-sub">${fmtD(d.eq_dol, true)}</div>
      </div>
      ${donut(Math.min(100,Math.abs(d.eq_r/2)), d.eq_r>0?'var(--green2)':'var(--red2)', fmtR(d.eq_r))}
    </div>
    <div class="kpi-card anim d2">
      <div class="kpi-icon pink">⚡</div>
      <div class="kpi-info">
        <div class="kpi-label">Profit Factor</div>
        <div class="kpi-value ${d.pf>=2?'pos':d.pf>=1?'gold':'neg'}">${d.pf}</div>
        <div class="kpi-sub">RR moy ${d.avg_rr}R</div>
      </div>
      ${donut(Math.min(100,(d.pf/4)*100), 'var(--pink2)', d.pf)}
    </div>
    <div class="kpi-card anim d3">
      <div class="kpi-icon red">🛡️</div>
      <div class="kpi-info">
        <div class="kpi-label">Max Drawdown</div>
        <div class="kpi-value neg">${d.dd_r.toFixed(1)}R</div>
        <div class="kpi-sub">${fmtD(d.dd_dol)} · série ${d.ml} pertes</div>
      </div>
      ${donut(Math.min(100,Math.abs(d.dd_r)*5), 'var(--red2)', d.dd_r.toFixed(0)+'R')}
    </div>
  </div>

  <!-- ROW 2 : Equity + Setups -->
  <div class="row-2 anim d1">
    <div class="card">
      <div class="card-head">
        <div class="card-title">Courbe d'équité</div>
        <div class="card-sub">${fmtD(d.eq_dol, true)}</div>
      </div>
      <div class="chart-box"><canvas id="eqCanvas"></canvas></div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Setups</div>
        <div class="card-sub">S1 Bear vs S2 Bull</div>
      </div>
      <div class="setup-grid">
        ${[s1,s2].map((s,i) => `
        <div class="setup-side">
          <div class="setup-tag ${i===0?'bear':'bull'}">S${i+1} ${i===0?'↓ BEAR':'↑ BULL'}</div>
          <div class="setup-eq ${(s.eq_r||0)>0?'pos':'neg'}">${fmtR(s.eq_r||0)}</div>
          <div class="metric-mini-grid">
            <div class="metric-mini"><div class="mm-label">WR</div><div class="mm-val ${(s.wr||0)>=50?'pos':'neg'}">${s.wr||0}%</div></div>
            <div class="metric-mini"><div class="mm-label">PF</div><div class="mm-val ${(s.pf||0)>=2?'pos':(s.pf||0)>=1?'gold':'neg'}">${s.pf||0}</div></div>
            <div class="metric-mini"><div class="mm-label">RR</div><div class="mm-val gold">${s.rr||0}R</div></div>
            <div class="metric-mini"><div class="mm-label">Trades</div><div class="mm-val cyan">${s.trades||0}</div></div>
            <div class="metric-mini"><div class="mm-label">Wins</div><div class="mm-val pos">${s.wins||0}</div></div>
            <div class="metric-mini"><div class="mm-label">Max↓</div><div class="mm-val neg">${s.max_loss_streak||0}</div></div>
          </div>
          <div class="sess-row">
            <span class="sess-chip">LON ${s.london||'0/0'}</span>
            <span class="sess-chip">NY ${s.ny||'0/0'}</span>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <!-- ROW 3 : Mois + Trades -->
  <div class="row-2 anim d2">
    <div class="card">
      <div class="card-head">
        <div class="card-title">Performance mensuelle</div>
        <div class="card-sub">${d.months.length} mois</div>
      </div>
      <!-- Mini bar chart -->
      <div class="bar-chart" id="barChart"></div>
      <!-- Table -->
      <table class="m-table">
        <thead><tr>
          <th>Mois</th><th>Trades</th><th>Win Rate</th><th>R</th><th>P&amp;L</th>
        </tr></thead>
        <tbody>
          ${d.months.map(m => `<tr>
            <td>${m.label}</td>
            <td>${m.trades}</td>
            <td><span class="wr-pill ${m.wr>=50?'pos':'neg'}">${m.wr}%</span></td>
            <td class="${m.r>0?'pos-v':'neg-v'}">${m.r>0?'+':''}${m.r}R</td>
            <td class="${m.dol>0?'pos-v':'neg-v'}">${fmtD(m.dol,true)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Derniers trades</div>
        <div class="card-sub">20 récents</div>
      </div>
      <table class="t-table">
        <thead><tr>
          <th>Setup</th><th>Heure</th><th>Entrée</th><th>RR</th><th>P&amp;L</th>
        </tr></thead>
        <tbody>
          ${d.recent.map(t => `<tr>
            <td><span class="t-badge ${t.setup===1?'t-s1':'t-s2'}">S${t.setup} ${t.dir==='long'?'↑':'↓'}</span></td>
            <td style="color:var(--text3)">${t.time.slice(5,16)}</td>
            <td>${t.entry.toFixed(2)}</td>
            <td class="${t.result==='win'?'pos-v':'neg-v'}">${t.rr.toFixed(2)}R</td>
            <td class="${t.pnl>0?'pos-v':'neg-v'}">${fmtD(t.pnl,true)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>

  `;

  drawEquity(d.equity_curve);
  drawBars(d.months);
}

function drawEquity(data) {
  const canvas = document.getElementById('eqCanvas');
  if (!canvas || !data.length) return;
  const wrap  = canvas.parentElement;
  const dpr   = window.devicePixelRatio || 1;
  canvas.width  = wrap.clientWidth  * dpr;
  canvas.height = wrap.clientHeight * dpr;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const pad = {t:10, r:16, b:28, l:56};
  const cw = W-pad.l-pad.r, ch = H-pad.t-pad.b;

  const vals = data.map(d=>d.y);
  const minV = Math.min(0,...vals), maxV = Math.max(0,...vals);
  const range = maxV-minV || 1;
  const xS = i => pad.l + (i/(data.length-1))*cw;
  const yS = v => pad.t + ch - ((v-minV)/range)*ch;
  const lastV = vals[vals.length-1];
  const lc = lastV>=0 ? '#10b981' : '#ef4444';

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,.04)'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+(ch/4)*i;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    const v=maxV-(range/4)*i;
    ctx.fillStyle='#4a5568';ctx.font=`9px 'JetBrains Mono'`;ctx.textAlign='right';
    ctx.fillText((v>=0?'+':'')+Math.round(v)+'$', pad.l-6, y+3);
  }

  // Zero
  const y0=yS(0);
  ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(pad.l+cw,y0);ctx.stroke();
  ctx.setLineDash([]);

  // Gradient fill
  const g=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  if(lastV>=0){g.addColorStop(0,'rgba(16,185,129,.2)');g.addColorStop(1,'rgba(16,185,129,0)');}
  else{g.addColorStop(0,'rgba(239,68,68,0)');g.addColorStop(1,'rgba(239,68,68,.15)');}
  ctx.beginPath();ctx.moveTo(xS(0),yS(0));
  data.forEach((pt,i)=>ctx.lineTo(xS(i),yS(pt.y)));
  ctx.lineTo(xS(data.length-1),yS(0));ctx.closePath();
  ctx.fillStyle=g;ctx.fill();

  // Line
  ctx.beginPath();ctx.strokeStyle=lc;ctx.lineWidth=2;
  data.forEach((pt,i)=>i===0?ctx.moveTo(xS(i),yS(pt.y)):ctx.lineTo(xS(i),yS(pt.y)));
  ctx.stroke();

  // Dots at extremes
  const drawDot=(i,v)=>{
    ctx.beginPath();ctx.arc(xS(i),yS(v),3,0,Math.PI*2);
    ctx.fillStyle=lc;ctx.fill();
  };
  drawDot(0,vals[0]);drawDot(data.length-1,lastV);

  // Dates
  ctx.fillStyle='#4a5568';ctx.font=`9px 'JetBrains Mono'`;ctx.textAlign='center';
  const step=Math.ceil(data.length/6);
  data.forEach((pt,i)=>{if(i%step===0||i===data.length-1)ctx.fillText(pt.x.slice(5),xS(i),H-4);});
}

function drawBars(months) {
  const wrap = document.getElementById('barChart');
  if (!wrap || !months.length) return;
  const maxAbs = Math.max(...months.map(m=>Math.abs(m.r)));
  wrap.innerHTML = months.map(m=>{
    const h = Math.max(2, (Math.abs(m.r)/maxAbs)*60);
    const color = m.r>0?'var(--green)':'var(--red)';
    return `<div class="bar-col">
      <div class="bar" style="height:${h}px;background:${color};opacity:${m.r>0?.8:.6};"
           title="${m.label}: ${m.r>0?'+':''}${m.r}R"></div>
      <div class="bar-lbl">${m.label.slice(0,3)}</div>
    </div>`;
  }).join('');
}

load();
</script>
